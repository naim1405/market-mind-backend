services:
    mongodb:
        container_name: mongodb
        image: mongo:7
        command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
        environment:
            MONGO_INITDB_DATABASE: market_mind_db
        ports:
            - '27018:27017'
        volumes:
            - mongo_data:/data/db
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD',
                    'mongosh',
                    '--quiet',
                    '--eval',
                    "db.adminCommand('ping').ok",
                    'mongodb://localhost:27017/admin',
                ]
            interval: 10s
            timeout: 5s
            retries: 10

    db-init-replica:
        container_name: db-init-replica
        image: mongo:7
        depends_on:
            mongodb:
                condition: service_started
        entrypoint:
            - bash
            - -c
            - |
                until mongosh --host db:27017 --quiet --eval "db.adminCommand('ping').ok" > /dev/null 2>&1; do
                  sleep 1
                done
                mongosh --host mongodb:27017 --quiet --eval "try { rs.status() } catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]}) }"
        restart: 'no'

    server:
        container_name: server
        image: server
        profiles: ['app']
        build:
            context: ./
            dockerfile: Dockerfile
        env_file:
            - ./.env
        environment:
            DATABASE_URL: mongodb://mongodb:27017/market_mind_db?replicaSet=rs0&directConnection=true
        ports:
            - '5000:5000'
        volumes:
            - app_log:/app/logs
        depends_on:
            db-init-replica:
                condition: service_completed_successfully
        restart: unless-stopped

volumes:
    mongo_data:
    app_log:
